<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Access unavailable | LogiSphere</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="bg-dark text-light d-flex align-items-center min-vh-100">
<main class="container text-center"><h1 class="h3 mb-3">Access unavailable</h1>
    <p class="text-secondary" th:text="${message}">You do not have access to this page.</p>
    <a class="btn btn-primary" th:href="@{/dashboard}">Return to dashboard</a>
    <form th:action="@{/logout}" method="post" class="d-inline"><button class="btn btn-outline-light ms-2" type="submit">Sign out</button></form>
</main></body></html>
