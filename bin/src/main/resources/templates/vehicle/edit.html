<!DOCTYPE html>

<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>

        Edit Vehicle | LogiSphere

    </title>



    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

   

    <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

   

    <link
            rel="stylesheet"
            th:href="@{/css/style.css}">

    <link
            rel="stylesheet"
            th:href="@{/css/dashboard.css}">

    <link
            rel="stylesheet"
            th:href="@{/css/vehicle.css}">

</head>

<body>

<div class="container py-5">

    <a th:href="@{/admin/dashboard}" class="btn btn-outline-primary mb-3">← Back to Dashboard</a>

    <div class="content-card">

        <div class="d-flex justify-content-between align-items-center mb-4">

            <div>

                <h2>

                    Edit Vehicle

                </h2>

                <p class="text-muted">

                    Update vehicle information.

                </p>

            </div>

            <a
                    th:href="@{/vehicles}"
                    class="btn btn-secondary">

                <i class="fa-solid fa-arrow-left"></i>

                Back

            </a>

        </div>

        <form
                th:action="@{/vehicles/update}"
                th:object="${vehicle}"
                method="post">

           

            <input
                    type="hidden"
                    th:field="*{id}">

            <div class="row">
            

<div class="col-md-6 mb-4">

    <label class="form-label">

        Vehicle Number

    </label>

    <input
            type="text"
            class="form-control"
            th:field="*{vehicleNumber}"
            placeholder="AP39AB1234"
            required>

</div>



<div class="col-md-6 mb-4">

    <label class="form-label">

        Vehicle Type

    </label>

    <select
            class="form-select"
            th:field="*{vehicleType}"
            required>

        <option value="">Select Vehicle Type</option>

        <option value="TRUCK">Truck</option>

        <option value="MINI_TRUCK">Mini Truck</option>

        <option value="VAN">Van</option>

        <option value="CONTAINER">Container</option>

    </select>

</div>



<div class="col-md-6 mb-4">

    <label class="form-label">

        Driver Name

    </label>

    <input
            type="text"
            class="form-control"
            th:field="*{driverName}"
            placeholder="Driver Name"
            required>

</div>



<div class="col-md-6 mb-4">

    <label class="form-label">

        Driver Phone

    </label>

    <input
            type="text"
            class="form-control"
            th:field="*{driverPhone}"
            placeholder="9876543210"
            maxlength="10"
            required>

</div>



<div class="col-md-6 mb-4">

    <label class="form-label">

        Capacity (Kg)

    </label>

    <input
            type="number"
            class="form-control"
            th:field="*{capacity}"
            placeholder="10000"
            step="0.01"
            required>

</div>



<div class="col-md-6 mb-4">

    <label class="form-label">

        Fuel Type

    </label>

    <select
            class="form-select"
            th:field="*{fuelType}"
            required>

        <option value="">Select Fuel Type</option>

        <option value="DIESEL">Diesel</option>

        <option value="PETROL">Petrol</option>

        <option value="CNG">CNG</option>

        <option value="ELECTRIC">Electric</option>

    </select>

</div>

<div class="col-md-6 mb-4">

    <label class="form-label">

        Status

    </label>

    <select
            class="form-select"
            th:field="*{status}"
            required>

        <option value="ACTIVE">Active</option>

        <option value="IN_SERVICE">In Service</option>

        <option value="UNDER_MAINTENANCE">Under Maintenance</option>

    </select>

</div>



<div class="col-md-6 mb-4">

    <label class="form-label">

        Current Location

    </label>

    <input
            type="text"
            class="form-control"
            th:field="*{currentLocation}"
            placeholder="Hyderabad"
            required>

</div>

<div class="col-md-6 mb-4">

    <label class="form-label">

        Last Service Date

    </label>

    <input
            type="date"
            class="form-control"
            th:field="*{lastServiceDate}"
            required>

</div>


<div class="col-md-6 mb-4">

    <label class="form-label">

        Insurance Expiry

    </label>

    <input
            type="date"
            class="form-control"
            th:field="*{insuranceExpiry}"
            required>

</div>

</div>


<div class="d-flex justify-content-end gap-3 mt-4">

    <a
            th:href="@{/vehicles}"
            class="btn btn-secondary">

        <i class="fa-solid fa-xmark"></i>

        Cancel

    </a>

    <button
            type="submit"
            class="btn btn-primary">

        <i class="fa-solid fa-floppy-disk"></i>

        Update Vehicle

    </button>

</div>

</form>

</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script th:src="@{/js/vehicle.js}"></script>

</body>

</html>
