<!doctype html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Vehicle Details | LogiSphere</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"></head><body class="bg-light"><main class="container py-4"><div class="d-flex justify-content-between mb-4"><h1 class="h3">Vehicle Details</h1><div><a class="btn btn-outline-secondary" th:href="@{/vehicles}">Back</a> <a class="btn btn-primary" th:href="@{/vehicles/edit/{id}(id=${vehicle.id})}">Edit</a></div></div><div class="card"><div class="card-body"><dl class="row mb-0"><dt class="col-sm-3">Vehicle Number</dt><dd class="col-sm-9" th:text="${vehicle.vehicleNumber}"></dd><dt class="col-sm-3">Type</dt><dd class="col-sm-9" th:text="${vehicle.vehicleType}"></dd><dt class="col-sm-3">Driver</dt><dd class="col-sm-9" th:text="${vehicle.driverName}"></dd><dt class="col-sm-3">Capacity</dt><dd class="col-sm-9" th:text="${vehicle.capacity}"></dd><dt class="col-sm-3">Status</dt><dd class="col-sm-9" th:text="${vehicle.status}"></dd><dt class="col-sm-3">Location</dt><dd class="col-sm-9" th:text="${vehicle.currentLocation}"></dd></dl></div></div></main></body></html>
