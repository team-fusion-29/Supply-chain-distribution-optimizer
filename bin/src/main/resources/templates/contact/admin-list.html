<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><title>Contact Messages</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="container py-4"><h1 class="h3">Contact messages</h1><a th:href="@{/admin/dashboard}" class="btn btn-outline-secondary mb-3">Dashboard</a><div class="alert alert-success" th:if="${success}" th:text="${success}"></div><div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
<table class="table table-striped"><thead><tr><th>Received</th><th>Sender</th><th>Subject</th><th>Status</th><th></th></tr></thead><tbody><tr th:each="message : ${messages}"><td th:text="${#temporals.format(message.createdAt, 'dd MMM yyyy HH:mm')}"></td><td><span th:text="${message.fullName}"></span><br><small th:text="${message.email}"></small></td><td th:text="${message.subject}"></td><td th:text="${message.status}"></td><td class="d-flex gap-1"><a class="btn btn-sm btn-primary" th:href="@{/contact/admin/messages/{id}(id=${message.id})}">View</a><form th:action="@{/contact/admin/messages/{id}/delete(id=${message.id})}" method="post" onsubmit="return confirm('Delete this contact message?');"><button type="submit" class="btn btn-sm btn-danger">Delete</button></form></td></tr><tr th:if="${messages.empty}"><td colspan="5">No contact messages.</td></tr></tbody></table></body></html>
