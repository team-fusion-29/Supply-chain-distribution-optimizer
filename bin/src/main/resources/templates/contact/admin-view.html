<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><title>Contact Message</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="container py-4"><a th:href="@{/contact/admin/messages}" class="btn btn-outline-secondary mb-3">Back</a><div class="alert alert-success" th:if="${success}" th:text="${success}"></div><div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
<h1 class="h3" th:text="${contact.subject}"></h1><p><strong th:text="${contact.fullName}"></strong> &lt;<span th:text="${contact.email}"></span>&gt;</p><p class="border rounded p-3" th:text="${contact.message}"></p>
<div th:if="${contact.replyMessage != null}" class="border rounded p-3 mb-3"><strong>Reply sent</strong><p th:text="${contact.replyMessage}"></p></div>
<form th:action="@{/contact/admin/messages/{id}/reply(id=${contact.id})}" method="post"><label class="form-label">Reply</label><textarea name="replyMessage" class="form-control" rows="5" required></textarea><button class="btn btn-primary mt-3">Send reply</button></form></body></html>
