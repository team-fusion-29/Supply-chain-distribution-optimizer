<!DOCTYPE html>

<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>

        Add Route | LogiSphere

    </title>

    

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

    

    <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

   

    <link
            rel="stylesheet"
            th:href="@{/css/style.css}">

    <link
            rel="stylesheet"
            th:href="@{/css/dashboard.css}">

    <link
            rel="stylesheet"
            th:href="@{/css/route.css}">

</head>

<body>


<div class="sidebar">

    <div class="logo">

        <i class="fa-solid fa-route"></i>

        <span>

            LogiSphere

        </span>

    </div>

    <ul>

        <li>

            <a th:href="@{/dashboard}">

                <i class="fa-solid fa-house"></i>

                Dashboard

            </a>

        </li>

        <li>

            <a th:href="@{/shipments}">

                <i class="fa-solid fa-box"></i>

                Shipments

            </a>

        </li>

        <li>

            <a th:href="@{/vehicles}">

                <i class="fa-solid fa-truck"></i>

                Vehicles

            </a>

        </li>

        <li>

            <a th:href="@{/warehouses}">

                <i class="fa-solid fa-warehouse"></i>

                Warehouses

            </a>

        </li>

        <li class="active">

            <a th:href="@{/routes}">

                <i class="fa-solid fa-route"></i>

                Routes

            </a>

        </li>

        <li>

            <a th:href="@{/logout}">

                <i class="fa-solid fa-right-from-bracket"></i>

                Logout

            </a>

        </li>

    </ul>

</div>


<div class="main-content">

    <a th:href="@{/admin/dashboard}" class="btn btn-outline-primary mb-3">← Back to Dashboard</a>

    <div class="topbar">

        <div>

            <h2>

                Add Route

            </h2>

            <p>

                Create a new transportation route.

            </p>

        </div>

        <div class="profile">

            <img
                    src="https://i.pravatar.cc/100"
                    alt="Profile">

            <div>

                <h6
                        th:text="${user.firstName}">

                    User

                </h6>

                <span
                        th:text="${user.role}">

                    ADMIN

                </span>

            </div>

        </div>

    </div>

   

    <div class="content-card">

        <div class="d-flex
                    justify-content-between
                    align-items-center
                    mb-4">

            <h3>

                Route Details

            </h3>

            <a
                    th:href="@{/routes}"
                    class="btn btn-secondary">

                <i class="fa-solid fa-arrow-left"></i>

                Back

            </a>

        </div>

        

        <div
                th:if="${error}"
                class="alert alert-danger">

            <span
                    th:text="${error}">

            </span>

        </div>

        <form
                th:action="@{/routes/save}"
                th:object="${route}"
                method="post">

            <div class="row">

                

                <div class="col-md-6 mb-3">

                    <label class="form-label">

                        Route Code

                    </label>

                    <input
                            type="text"
                            class="form-control"
                            th:field="*{routeCode}"
                            placeholder="RT001"
                            required>

                </div>

                

                <div class="col-md-6 mb-3">

                    <label class="form-label">

                        Source

                    </label>

                    <input
                            type="text"
                            class="form-control"
                            th:field="*{source}"
                            placeholder="Hyderabad"
                            required>

                </div>
                               

                <div class="col-md-6 mb-3">

                    <label class="form-label">

                        Destination

                    </label>

                    <input
                            type="text"
                            class="form-control"
                            th:field="*{destination}"
                            placeholder="Chennai"
                            required>

                </div>

            

                <div class="col-md-6 mb-3">

                    <label class="form-label">

                        Distance (KM)

                    </label>

                    <input
                            type="number"
                            step="0.01"
                            class="form-control"
                            th:field="*{distance}"
                            placeholder="650"
                            required>

                </div>

                

                <div class="col-md-6 mb-3">

                    <label class="form-label">

                        Estimated Time (Hours)

                    </label>

                    <input
                            type="number"
                            step="0.1"
                            class="form-control"
                            th:field="*{estimatedTime}"
                            placeholder="10"
                            required>

                </div>

                

                <div class="col-md-6 mb-3">

                    <label class="form-label">

                        Road Type

                    </label>

                    <select
                            class="form-select"
                            th:field="*{roadType}"
                            required>

                        <option value="">

                            Select Road Type

                        </option>

                        <option value="HIGHWAY">

                            Highway

                        </option>

                        <option value="STATE_HIGHWAY">

                            State Highway

                        </option>

                        <option value="CITY_ROAD">

                            City Road

                        </option>

                        <option value="RURAL_ROAD">

                            Rural Road

                        </option>

                    </select>

                </div>

                

                <div class="col-md-6 mb-3">

                    <label class="form-label">

                        Traffic Level

                    </label>

                    <select
                            class="form-select"
                            th:field="*{trafficLevel}"
                            required>

                        <option value="">

                            Select Traffic

                        </option>

                        <option value="LOW">

                            Low

                        </option>

                        <option value="MEDIUM">

                            Medium

                        </option>

                        <option value="HIGH">

                            High

                        </option>

                    </select>

                </div>

                

                <div class="col-md-6 mb-3">

                    <label class="form-label">

                        Weather Condition

                    </label>

                    <select
                            class="form-select"
                            th:field="*{weatherCondition}"
                            required>

                        <option value="">

                            Select Weather

                        </option>

                        <option value="CLEAR">

                            Clear

                        </option>

                        <option value="RAIN">

                            Rain

                        </option>

                        <option value="FOG">

                            Fog

                        </option>

                        <option value="STORM">

                            Storm

                        </option>

                    </select>

                </div>

                <div class="col-md-6 mb-3">

                    <label class="form-label">

                        Status

                    </label>

                    <select
                            class="form-select"
                            th:field="*{status}"
                            required>

                        <option value="ACTIVE">

                            ACTIVE

                        </option>

                        <option value="BLOCKED">

                            BLOCKED

                        </option>

                        <option value="MAINTENANCE">

                            MAINTENANCE

                        </option>

                    </select>

                </div>

                

                <div class="col-md-12 mb-4">

                    <label class="form-label">

                        Description

                    </label>

                    <textarea
                            class="form-control"
                            th:field="*{description}"
                            rows="5"
                            placeholder="Enter additional route information...">

                    </textarea>

                </div>

            </div>

           

            <div class="d-flex justify-content-end gap-2 mt-3">

                <button
                        type="reset"
                        class="btn btn-secondary">

                    <i class="fa-solid fa-rotate-left"></i>

                    Reset

                </button>

                <button
                        type="submit"
                        class="btn btn-primary">

                    <i class="fa-solid fa-floppy-disk"></i>

                    Save Route

                </button>

            </div>

        </form>

    </div>

</div>

<script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>


<script
        th:src="@{/js/route.js}">
</script>

</body>

</html>
