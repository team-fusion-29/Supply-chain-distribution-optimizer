<!doctype html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Route Details | LogiSphere</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"></head><body class="bg-light"><main class="container py-4"><div class="d-flex justify-content-between mb-4"><h1 class="h3">Route Details</h1><div><a class="btn btn-outline-secondary" th:href="@{/routes}">Back</a> <a class="btn btn-primary" th:href="@{/routes/edit/{id}(id=${route.id})}">Edit</a></div></div><div class="card"><div class="card-body"><dl class="row mb-0"><dt class="col-sm-3">Route Code</dt><dd class="col-sm-9" th:text="${route.routeCode}"></dd><dt class="col-sm-3">Route</dt><dd class="col-sm-9" th:text="${route.source + ' → ' + route.destination}"></dd><dt class="col-sm-3">Distance / Time</dt><dd class="col-sm-9" th:text="${route.distance + ' km / ' + route.estimatedTime + ' hours'}"></dd><dt class="col-sm-3">Traffic</dt><dd class="col-sm-9" th:text="${route.trafficLevel}"></dd><dt class="col-sm-3">Status</dt><dd class="col-sm-9" th:text="${route.status}"></dd></dl></div></div></main></body></html>
