<!doctype html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Shipment Details | LogiSphere</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"></head><body class="bg-light"><main class="container py-4"><div class="d-flex justify-content-between mb-4"><h1 class="h3">Shipment Details</h1><div><a class="btn btn-outline-secondary" th:href="@{/shipments}">Back</a> <a class="btn btn-primary" th:href="@{/shipments/edit/{id}(id=${shipment.id})}">Edit</a></div></div><div class="card"><div class="card-body"><dl class="row mb-0"><dt class="col-sm-3">Tracking Number</dt><dd class="col-sm-9" th:text="${shipment.trackingNumber}"></dd><dt class="col-sm-3">Customer</dt><dd class="col-sm-9" th:text="${shipment.customerName}"></dd><dt class="col-sm-3">Route</dt><dd class="col-sm-9" th:text="${shipment.source + ' → ' + shipment.destination}"></dd><dt class="col-sm-3">Vehicle / Driver</dt><dd class="col-sm-9" th:text="${shipment.vehicleNumber + ' / ' + shipment.driverName}"></dd><dt class="col-sm-3">Status</dt><dd class="col-sm-9" th:text="${shipment.status}"></dd><dt class="col-sm-3">Delivery date</dt><dd class="col-sm-9" th:text="${shipment.expectedDeliveryDate}"></dd></dl></div></div></main></body></html>
