<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Notifications | LogiSphere</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <link rel="stylesheet"
          th:href="@{/css/notification.css}">

</head>

<body>

<div class="container py-5">

    <a th:href="@{/admin/dashboard}" class="btn btn-outline-primary mb-3">← Back to Dashboard</a>

    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>

            <h2 class="fw-bold">

                <i class="bi bi-bell-fill text-primary"></i>

                Notification Management

            </h2>

            <p class="text-muted">

                Manage all system notifications

            </p>

        </div>

        <a th:href="@{/notifications/add}"
           class="btn btn-primary">

            <i class="bi bi-plus-circle"></i>

            Add Notification

        </a>

    </div>

    <div class="row mb-4">

        <div class="col-md-4">

            <div class="card text-center shadow border-0">

                <div class="card-body">

                    <h6>Total Notifications</h6>

                    <h2 class="text-primary"
                        th:text="${totalNotifications}"></h2>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card text-center shadow border-0">

                <div class="card-body">

                    <h6>Unread Notifications</h6>

                    <h2 class="text-danger"
                        th:text="${unreadNotifications}"></h2>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card text-center shadow border-0">

                <div class="card-body">

                    <h6>Latest Notifications</h6>

                    <h2 class="text-success"
                        th:text="${latestNotifications.size()}"></h2>

                </div>

            </div>

        </div>

    </div>

    <div class="card shadow-lg border-0">

        <div class="card-body">

            <div class="row mb-4">

                <div class="col-md-6">

                    <input type="text"
                           id="searchNotification"
                           class="form-control"
                           placeholder="Search Notifications...">

                </div>

                <div class="col-md-3">

                    <select id="statusFilter"
                            class="form-select">

                        <option value="">All Status</option>

                        <option value="PENDING">Pending</option>

                        <option value="SENT">Sent</option>

                        <option value="FAILED">Failed</option>

                        <option value="READ">Read</option>

                    </select>

                </div>

                <div class="col-md-3">

                    <select id="priorityFilter"
                            class="form-select">

                        <option value="">All Priority</option>

                        <option value="LOW">Low</option>

                        <option value="MEDIUM">Medium</option>

                        <option value="HIGH">High</option>

                        <option value="CRITICAL">Critical</option>

                    </select>

                </div>

            </div>

            <div class="table-responsive">

                <table class="table table-hover align-middle"
                       id="notificationTable">

                    <thead class="table-dark">

                    <tr>

                        <th>ID</th>

                        <th>Title</th>

                        <th>Recipient</th>

                        <th>Type</th>

                        <th>Priority</th>

                        <th>Status</th>

                        <th>Created</th>

                        <th class="text-center">Actions</th>

                    </tr>

                    </thead>

                    <tbody>

                    <tr th:each="notification : ${notifications}">
                                            <td th:text="${notification.notificationId}"></td>

                        <td th:text="${notification.title}"></td>

                        <td th:text="${notification.recipientName}"></td>

                        <td>

                            <span class="badge bg-info"
                                  th:text="${notification.notificationType}">

                            </span>

                        </td>

                        <td>

                            <span th:if="${notification.priority == 'LOW'}"
                                  class="badge bg-success">

                                LOW

                            </span>

                            <span th:if="${notification.priority == 'MEDIUM'}"
                                  class="badge bg-primary">

                                MEDIUM

                            </span>

                            <span th:if="${notification.priority == 'HIGH'}"
                                  class="badge bg-warning text-dark">

                                HIGH

                            </span>

                            <span th:if="${notification.priority == 'CRITICAL'}"
                                  class="badge bg-danger">

                                CRITICAL

                            </span>

                        </td>

                        <td>

                            <span th:if="${notification.status == 'PENDING'}"
                                  class="badge bg-warning text-dark">

                                PENDING

                            </span>

                            <span th:if="${notification.status == 'SENT'}"
                                  class="badge bg-success">

                                SENT

                            </span>

                            <span th:if="${notification.status == 'FAILED'}"
                                  class="badge bg-danger">

                                FAILED

                            </span>

                            <span th:if="${notification.status == 'READ'}"
                                  class="badge bg-primary">

                                READ

                            </span>

                        </td>

                        <td th:text="${notification.createdAt}"></td>

                        <td class="text-center">

                            <a th:href="@{/notifications/view/{id}(id=${notification.id})}"
                               class="btn btn-info btn-sm me-1">

                                <i class="bi bi-eye-fill"></i>

                            </a>

                            <a th:href="@{/notifications/edit/{id}(id=${notification.id})}"
                               class="btn btn-warning btn-sm me-1">

                                <i class="bi bi-pencil-square"></i>

                            </a>

                            <a th:href="@{/notifications/read/{id}(id=${notification.id})}"
                               class="btn btn-success btn-sm me-1">

                                <i class="bi bi-check-circle-fill"></i>

                            </a>

                            <a th:href="@{/notifications/delete/{id}(id=${notification.id})}"
                               class="btn btn-danger btn-sm delete-btn">

                                <i class="bi bi-trash-fill"></i>

                            </a>

                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>
                        <div class="d-flex justify-content-between align-items-center mt-4">

                <a th:href="@{/}"
                   class="btn btn-secondary">

                    <i class="bi bi-house-door-fill"></i>

                    Dashboard

                </a>

                <a th:href="@{/notifications/add}"
                   class="btn btn-primary">

                    <i class="bi bi-plus-circle-fill"></i>

                    Create Notification

                </a>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script th:src="@{/js/notification.js}"></script>

</body>

</html>
