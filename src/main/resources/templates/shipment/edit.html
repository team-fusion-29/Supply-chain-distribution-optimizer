<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Shipment | LogiSphere</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <link rel="stylesheet" th:href="@{/css/shipment.css}">
</head>
<body>

<div class="sidebar">
    <div class="logo">
        <i class="fa-solid fa-truck-fast"></i>
        <span>LogiSphere</span>
    </div>
    <ul>
        <li>
            <a th:href="@{/dashboard}">
                <i class="fa-solid fa-house"></i>
                Dashboard
            </a>
        </li>
        <li class="active">
            <a th:href="@{/shipments}">
                <i class="fa-solid fa-box"></i>
                Shipments
            </a>
        </li>
        <li>
            <a th:href="@{/vehicles}">
                <i class="fa-solid fa-truck"></i>
                Vehicles
            </a>
        </li>
        <li>
            <a th:href="@{/warehouses}">
                <i class="fa-solid fa-warehouse"></i>
                Warehouses
            </a>
        </li>
        <li>
            <a th:href="@{/logout}">
                <i class="fa-solid fa-right-from-bracket"></i>
                Logout
            </a>
        </li>
    </ul>
</div>

<div class="main-content">

    <a th:href="@{/admin/dashboard}" class="btn btn-outline-primary mb-3">← Back to Dashboard</a>

    <div class="topbar">
        <h2>Edit Shipment</h2>
        <div class="profile">
            <img src="https://i.pravatar.cc/100" alt="Profile">
            <div>
                <h6 th:text="${user.firstName}">User</h6>
                <span th:text="${user.role}">ADMIN</span>
            </div>
        </div>
    </div>

    <div class="content-card">
        <h3>Shipment Details</h3>
        <hr>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form th:action="@{/shipments/update}" th:object="${shipment}" method="post">
            <input type="hidden" th:field="*{id}">

            <div class="row">
                <div class="col-md-6 mb-4">
                    <label class="form-label">Tracking Number</label>
                    <input type="text" class="form-control" th:field="*{trackingNumber}" placeholder="Enter Tracking Number" required>
                </div>

                <div class="col-md-6 mb-4">
                    <label class="form-label">Customer Name</label>
                    <input type="text" class="form-control" th:field="*{customerName}" placeholder="Enter Customer Name" required>
                </div>

                <div class="col-md-6 mb-4">
                    <label class="form-label">Source</label>
                    <input type="text" class="form-control" th:field="*{source}" placeholder="Enter Source City" required>
                </div>

                <div class="col-md-6 mb-4">
                    <label class="form-label">Destination</label>
                    <input type="text" class="form-control" th:field="*{destination}" placeholder="Enter Destination City" required>
                </div>

                <div class="col-md-6 mb-4">
                    <label class="form-label">Vehicle Number</label>
                    <input type="text" class="form-control" th:field="*{vehicleNumber}" placeholder="Example: AP39AB1234" required>
                </div>

                <div class="col-md-6 mb-4">
                    <label class="form-label">Driver Name</label>
                    <input type="text" class="form-control" th:field="*{driverName}" placeholder="Enter Driver Name" required>
                </div>

                <div class="col-md-6 mb-4">
                    <label class="form-label">Shipment Date</label>
                    <input type="date" class="form-control" th:field="*{shipmentDate}" required>
                </div>

                <div class="col-md-6 mb-4">
                    <label class="form-label">Expected Delivery Date</label>
                    <input type="date" class="form-control" th:field="*{expectedDeliveryDate}" required>
                </div>

                <div class="col-md-6 mb-4">
                    <label class="form-label">Weight (Kg)</label>
                    <input type="number" step="0.01" class="form-control" th:field="*{weight}" placeholder="Enter Weight" required>
                </div>

                <div class="col-md-6 mb-4">
                    <label class="form-label">Shipping Cost (₹)</label>
                    <input type="number" step="0.01" class="form-control" th:field="*{shippingCost}" placeholder="Enter Shipping Cost" required>
                </div>

                <div class="col-md-6 mb-4">
                    <label class="form-label">Status</label>
                    <select class="form-select" th:field="*{status}">
                        <option value="PENDING">PENDING</option>
                        <option value="IN_TRANSIT">IN TRANSIT</option>
                        <option value="DELIVERED">DELIVERED</option>
                        <option value="CANCELLED">CANCELLED</option>
                    </select>
                </div>

                <div class="col-md-6 mb-4">
                    <label class="form-label">Priority</label>
                    <select class="form-select" th:field="*{priority}">
                        <option value="LOW">LOW</option>
                        <option value="MEDIUM">MEDIUM</option>
                        <option value="HIGH">HIGH</option>
                        <option value="URGENT">URGENT</option>
                    </select>
                </div>

                <div class="col-12 mb-4">
                    <label class="form-label">Description</label>
                    <textarea rows="4" class="form-control" th:field="*{description}" placeholder="Enter shipment description..."></textarea>
                </div>

                <div class="col-12 d-flex justify-content-end gap-3">
                    <a th:href="@{/shipments}" class="btn btn-secondary">
                        <i class="fa-solid fa-arrow-left"></i> Back
                    </a>
                    <button type="submit" class="btn btn-primary">
                        <i class="fa-solid fa-floppy-disk"></i> Update Shipment
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/shipment.js}"></script>
</body>
</html>
