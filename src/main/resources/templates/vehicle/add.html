<!DOCTYPE html>

<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>

        Add Vehicle | LogiSphere

    </title>

    

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">


    <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    

    <link
            rel="stylesheet"
            th:href="@{/css/style.css}">

    <link
            rel="stylesheet"
            th:href="@{/css/dashboard.css}">

    <link
            rel="stylesheet"
            th:href="@{/css/vehicle.css}">

</head>

<body>



<div class="sidebar">

    <div class="logo">

        <i class="fa-solid fa-truck-fast"></i>

        <span>

            LogiSphere

        </span>

    </div>

    <ul class="menu">

        <li>

            <a th:href="@{/dashboard}">

                <i class="fa-solid fa-house"></i>

                Dashboard

            </a>

        </li>

        <li>

            <a th:href="@{/shipments}">

                <i class="fa-solid fa-box"></i>

                Shipments

            </a>

        </li>

        <li class="active">

            <a th:href="@{/vehicles}">

                <i class="fa-solid fa-truck"></i>

                Vehicles

            </a>

        </li>

    </ul>

    <div class="sidebar-footer">

        <a th:href="@{/logout}"
           class="logout-btn">

            <i class="fa-solid fa-right-from-bracket"></i>

            Logout

        </a>

    </div>

</div>



<div class="main-content">

    <a th:href="@{/admin/dashboard}" class="btn btn-outline-primary mb-3">← Back to Dashboard</a>

    <div class="topbar">

        <div>

            <h2>

                Add New Vehicle

            </h2>

            <p>

                Register a vehicle into the logistics network.

            </p>

        </div>

    </div>

    

    <div
            th:if="${error}"
            class="alert alert-danger">

        <span
                th:text="${error}">

        </span>

    </div>

    

    <div class="content-card">

        <form
                th:action="@{/vehicles/save}"
                th:object="${vehicle}"
                method="post">

            <div class="row">
                            

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Vehicle Number

                    </label>

                    <input
                            type="text"
                            class="form-control"
                            th:field="*{vehicleNumber}"
                            placeholder="AP39AB1234"
                            required>

                </div>

                

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Vehicle Type

                    </label>

                    <select
                            class="form-select"
                            th:field="*{vehicleType}"
                            required>

                        <option value="">

                            Select Vehicle Type

                        </option>

                        <option value="TRUCK">

                            Truck

                        </option>

                        <option value="VAN">

                            Van

                        </option>

                        <option value="MINI_TRUCK">

                            Mini Truck

                        </option>

                        <option value="CONTAINER">

                            Container

                        </option>

                    </select>

                </div>

               

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Driver Name

                    </label>

                    <input
                            type="text"
                            class="form-control"
                            th:field="*{driverName}"
                            placeholder="Enter Driver Name"
                            required>

                </div>

               

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Driver Phone

                    </label>

                    <input
                            type="tel"
                            class="form-control"
                            th:field="*{driverPhone}"
                            placeholder="9876543210"
                            required>

                </div>
                                

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Capacity (Kg)

                    </label>

                    <input
                            type="number"
                            class="form-control"
                            th:field="*{capacity}"
                            placeholder="10000"
                            min="1"
                            required>

                </div>

                

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Fuel Type

                    </label>

                    <select
                            class="form-select"
                            th:field="*{fuelType}"
                            required>

                        <option value="">

                            Select Fuel Type

                        </option>

                        <option value="DIESEL">

                            Diesel

                        </option>

                        <option value="PETROL">

                            Petrol

                        </option>

                        <option value="CNG">

                            CNG

                        </option>

                        <option value="ELECTRIC">

                            Electric

                        </option>

                    </select>

                </div>

                

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Current Location

                    </label>

                    <input
                            type="text"
                            class="form-control"
                            th:field="*{currentLocation}"
                            placeholder="Hyderabad"
                            required>

                </div>

                

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Last Service Date

                    </label>

                    <input
                            type="date"
                            class="form-control"
                            th:field="*{lastServiceDate}"
                            required>

                </div>
                                

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Insurance Expiry

                    </label>

                    <input
                            type="date"
                            class="form-control"
                            th:field="*{insuranceExpiry}"
                            required>

                </div>

                

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Vehicle Status

                    </label>

                    <select
                            class="form-select"
                            th:field="*{status}"
                            required>

                        <option value="ACTIVE">

                            Active

                        </option>

                        <option value="IN_SERVICE">

                            In Service

                        </option>

                        <option value="UNDER_MAINTENANCE">

                            Under Maintenance

                        </option>

                        <option value="OUT_OF_SERVICE">

                            Out Of Service

                        </option>

                    </select>

                </div>

               

                <div class="col-12 mb-4">

                    <label class="form-label">

                        Description

                    </label>

                    <textarea
                            class="form-control"
                            th:field="*{description}"
                            rows="4"
                            placeholder="Enter vehicle description...">

                    </textarea>

                </div>

            </div>

           

            <div class="d-flex justify-content-end gap-3">

                <a
                        th:href="@{/vehicles}"
                        class="btn btn-secondary">

                    <i class="fa-solid fa-arrow-left"></i>

                    Cancel

                </a>

                <button
                        type="submit"
                        class="btn btn-primary">

                    <i class="fa-solid fa-floppy-disk"></i>

                    Save Vehicle

                </button>

            </div>

        </form>

    </div>

</div>



<script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>


<script
        th:src="@{/js/vehicle.js}">
</script>

</body>

</html>
