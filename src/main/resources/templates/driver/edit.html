<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Edit Driver | LogiSphere</title>

   

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

   

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    

    <link rel="stylesheet"
          th:href="@{/css/driver.css}">

</head>

<body>

<div class="driver-container">

    <a th:href="@{/admin/dashboard}" class="btn btn-outline-primary mb-3">← Back to Dashboard</a>


    <div class="page-header">

        <h2>

            <i class="bi bi-pencil-square"></i>

            Edit Driver

        </h2>

        <p>

            Update Driver Information

        </p>

    </div>


    <div class="driver-card">

        <form th:action="@{/drivers/update}"

              th:object="${driver}"

              method="post">

            

            <input type="hidden"

                   th:field="*{id}">

            <div class="row">

              

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Driver ID

                    </label>

                    <input type="text"

                           class="form-control"

                           th:field="*{driverId}"

                           readonly>

                </div>

                

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Full Name

                    </label>

                    <input type="text"

                           class="form-control"

                           th:field="*{fullName}"

                           required>

                </div>

                

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Email

                    </label>

                    <input type="email"

                           class="form-control"

                           th:field="*{email}"

                           required>

                </div>

                

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Mobile Number

                    </label>

                    <input type="text"

                           class="form-control"

                           th:field="*{phone}"

                           required>

                </div>
                                

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        License Number

                    </label>

                    <input type="text"

                           class="form-control"

                           th:field="*{licenseNumber}"

                           required>

                </div>

               

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Aadhaar Number

                    </label>

                    <input type="text"

                           class="form-control"

                           th:field="*{aadhaarNumber}"

                           required>

                </div>



                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Age

                    </label>

                    <input type="number"

                           class="form-control"

                           th:field="*{age}"

                           required>

                </div>

                

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Experience (Years)

                    </label>

                    <input type="number"

                           class="form-control"

                           th:field="*{experience}"

                           required>

                </div>


                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Gender

                    </label>

                    <select class="form-select"

                            th:field="*{gender}"

                            required>

                        <option value="Male">Male</option>

                        <option value="Female">Female</option>

                        <option value="Other">Other</option>

                    </select>

                </div>

               

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Address

                    </label>

                    <input type="text"

                           class="form-control"

                           th:field="*{address}"

                           required>

                </div>

                

                <div class="col-md-4 mb-4">

                    <label class="form-label">

                        City

                    </label>

                    <input type="text"

                           class="form-control"

                           th:field="*{city}"

                           required>

                </div>

                

                <div class="col-md-4 mb-4">

                    <label class="form-label">

                        State

                    </label>

                    <input type="text"

                           class="form-control"

                           th:field="*{state}"

                           required>

                </div>

                

                <div class="col-md-4 mb-4">

                    <label class="form-label">

                        Country

                    </label>

                    <input type="text"

                           class="form-control"

                           th:field="*{country}"

                           required>

                </div>

                

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Pincode

                    </label>

                    <input type="text"

                           class="form-control"

                           th:field="*{pincode}"

                           required>

                </div>

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Driver Status

                    </label>

                    <select class="form-select"

                            th:field="*{status}"

                            required>

                        <option value="AVAILABLE">AVAILABLE</option>

                        <option value="ON_TRIP">ON TRIP</option>

                        <option value="OFFLINE">OFFLINE</option>

                        <option value="ON_LEAVE">ON LEAVE</option>

                    </select>

                </div>

                

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Assigned Vehicle

                    </label>

                    <input type="text"

                           class="form-control"

                           th:field="*{assignedVehicle}">

                </div>

                

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Assigned Shipment

                    </label>

                    <input type="text"

                           class="form-control"

                           th:field="*{assignedShipment}">

                </div>

              
                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Assigned Route

                    </label>

                    <input type="text"

                           class="form-control"

                           th:field="*{assignedRoute}">

                </div>

               

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Assigned Warehouse

                    </label>

                    <input type="text"

                           class="form-control"

                           th:field="*{assignedWarehouse}">

                </div>

                

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Emergency Contact Name

                    </label>

                    <input type="text"

                           class="form-control"

                           th:field="*{emergencyContactName}">

                </div>

                

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Emergency Contact Number

                    </label>

                    <input type="text"

                           class="form-control"

                           th:field="*{emergencyContactNumber}">

                </div>

                

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Joining Date

                    </label>

                    <input type="date"

                           class="form-control"

                           th:field="*{joiningDate}">

                </div>

                

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Salary

                    </label>

                    <input type="number"

                           step="0.01"

                           class="form-control"

                           th:field="*{salary}">

                </div>

            </div>

            

            <div class="d-flex justify-content-between mt-4">

                <a th:href="@{/drivers}"

                   class="btn btn-secondary">

                    <i class="bi bi-arrow-left-circle"></i>

                    Back

                </a>

                <button type="submit"

                        class="btn btn-success">

                    <i class="bi bi-check-circle-fill"></i>

                    Update Driver

                </button>

            </div>

        </form>

    </div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


<script th:src="@{/js/driver.js}"></script>

</body>

</html>
