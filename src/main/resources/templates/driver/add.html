<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Add Driver | LogiSphere</title>

    

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

   

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

   

    <link rel="stylesheet"
          th:href="@{/css/driver.css}">

</head>

<body>

<div class="driver-container">

    <a th:href="@{/admin/dashboard}" class="btn btn-outline-primary mb-3">← Back to Dashboard</a>

    

    <div class="page-header">

        <h2>
            <i class="bi bi-person-badge-fill"></i>
            Add Driver
        </h2>

        <p>
            Register a new logistics driver into the system
        </p>

    </div>

   

    <div class="driver-card">

        <form th:action="@{/drivers/save}"
              th:object="${driver}"
              method="post">

            <div class="alert alert-danger" th:if="${#fields.hasAnyErrors()}">
                <div th:each="error : ${#fields.allErrors()}" th:text="${error}"></div>
            </div>

            <div class="row">

               

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Driver ID

                    </label>

                    <input type="text"

                           class="form-control"

                           th:field="*{driverId}"

                           placeholder="DRV1001"

                           required>

                </div>

                

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Full Name

                    </label>

                    <input type="text"

                           class="form-control"

                           th:field="*{fullName}"

                           placeholder="Enter Driver Name"

                           required>

                </div>

                

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Email

                    </label>

                    <input type="email"

                           class="form-control"

                           th:field="*{email}"

                           placeholder="driver@email.com"

                           required>

                </div>

                

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Mobile Number

                    </label>

                    <input type="text"

                           class="form-control"

                           th:field="*{phone}"

                           placeholder="+91 XXXXXXXXXX"

                           required>

                </div>
                                

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        License Number

                    </label>

                    <input type="text"

                           class="form-control"

                           th:field="*{licenseNumber}"

                           placeholder="DL-XXXXXXXXXXXX"

                           required>

                </div>

                

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Aadhaar Number

                    </label>

                    <input type="text"

                           class="form-control"

                           th:field="*{aadhaarNumber}"

                           placeholder="XXXX XXXX XXXX"

                           required>

                </div>

                

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Age

                    </label>

                    <input type="number"

                           class="form-control"

                           th:field="*{age}"

                           placeholder="Age"

                           required>

                </div>

            

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Experience (Years)

                    </label>

                    <input type="number"

                           class="form-control"

                           th:field="*{experience}"

                           placeholder="Experience"

                           required>

                </div>

                

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Gender

                    </label>

                    <select class="form-select"

                            th:field="*{gender}"

                            required>

                        <option value="">Select Gender</option>

                        <option value="Male">Male</option>

                        <option value="Female">Female</option>

                        <option value="Other">Other</option>

                    </select>

                </div>

                

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Address

                    </label>

                    <input type="text"

                           class="form-control"

                           th:field="*{address}"

                           placeholder="Complete Address"

                           required>

                </div>

                

                <div class="col-md-4 mb-4">

                    <label class="form-label">

                        City

                    </label>

                    <input type="text"

                           class="form-control"

                           th:field="*{city}"

                           placeholder="City"

                           required>

                </div>

                

                <div class="col-md-4 mb-4">

                    <label class="form-label">

                        State

                    </label>

                    <input type="text"

                           class="form-control"

                           th:field="*{state}"

                           placeholder="State"

                           required>

                </div>

                

                <div class="col-md-4 mb-4">

                    <label class="form-label">

                        Country

                    </label>

                    <input type="text"

                           class="form-control"

                           th:field="*{country}"

                           value="India"

                           required>

                </div>

                

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Pincode

                    </label>

                    <input type="text"

                           class="form-control"

                           th:field="*{pincode}"

                           placeholder="Pincode"

                           required>

                </div>
                                

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Driver Status

                    </label>

                    <select class="form-select"
                            th:field="*{status}"
                            required>

                        <option value="">Select Status</option>
                        <option value="AVAILABLE">AVAILABLE</option>
                        <option value="ON_TRIP">ON TRIP</option>
                        <option value="OFFLINE">OFFLINE</option>
                        <option value="ON_LEAVE">ON LEAVE</option>

                    </select>

                </div>

              

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Assigned Vehicle

                    </label>

                    <input type="text"
                           class="form-control"
                           th:field="*{assignedVehicle}"
                           placeholder="Vehicle Number">

                </div>

                

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Assigned Shipment

                    </label>

                    <input type="text"
                           class="form-control"
                           th:field="*{assignedShipment}"
                           placeholder="Shipment Tracking Number">

                </div>

                

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Assigned Route

                    </label>

                    <input type="text"
                           class="form-control"
                           th:field="*{assignedRoute}"
                           placeholder="Route Name">

                </div>

                

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Assigned Warehouse

                    </label>

                    <input type="text"
                           class="form-control"
                           th:field="*{assignedWarehouse}"
                           placeholder="Warehouse Name">

                </div>

                

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Emergency Contact Name

                    </label>

                    <input type="text"
                           class="form-control"
                           th:field="*{emergencyContactName}"
                           placeholder="Emergency Contact Name">

                </div>

               

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Emergency Contact Number

                    </label>

                    <input type="text"
                           class="form-control"
                           th:field="*{emergencyContactNumber}"
                           placeholder="+91 XXXXXXXXXX">

                </div>

                

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Joining Date

                    </label>

                    <input type="date"
                           class="form-control"
                           th:field="*{joiningDate}">

                </div>

                

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Salary

                    </label>

                    <input type="number"
                           step="0.01"
                           class="form-control"
                           th:field="*{salary}"
                           placeholder="Monthly Salary">

                </div>

            </div>

            

            <div class="d-flex justify-content-between mt-4">

                <a th:href="@{/drivers}"
                   class="btn btn-secondary">

                    <i class="bi bi-arrow-left-circle"></i>
                    Back

                </a>

                <div>

                    <button type="reset"
                            class="btn btn-warning me-2">

                        <i class="bi bi-arrow-clockwise"></i>
                        Reset

                    </button>

                    <button type="submit"
                            class="btn btn-success">

                        <i class="bi bi-check-circle-fill"></i>
                        Save Driver

                    </button>

                </div>

            </div>

        </form>

    </div>

</div>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>



<script th:src="@{/js/driver.js}"></script>

</body>

</html>
