<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Add Weather | LogiSphere</title>

    

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

    

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
            rel="stylesheet">

    

    <link rel="stylesheet"
          th:href="@{/css/weather.css}">

</head>

<body>

<div class="container-fluid">

    <div class="row">

       

        <div class="col-lg-2 p-0"
             th:replace="~{fragments/sidebar :: sidebar}">
        </div>

        

        <div class="col-lg-10 main-content">

            <a th:href="@{/admin/dashboard}" class="btn btn-outline-primary mb-3">← Back to Dashboard</a>

            <div class="topbar">

                <div>

                    <h2>Add Weather</h2>

                    <p class="text-muted">

                        Add weather information for AI route monitoring.

                    </p>

                </div>

                <div class="profile">

                    <img th:src="@{/images/user.png}"
                         alt="Profile">

                    <span th:text="${user.firstName + ' ' + user.lastName}">
                        Admin
                    </span>

                </div>

            </div>



            <div class="alert alert-danger"
                 th:if="${error}"
                 th:text="${error}">
            </div>

            

            <div class="content-card">

                <h3 class="mb-4">

                    <i class="bi bi-cloud-sun-fill"></i>

                    Weather Details

                </h3>

                <form
                        th:action="@{/weather/save}"
                        th:object="${weather}"
                        method="post">

                    <div class="row">

                        

                        <div class="col-md-4 mb-3">

                            <label class="form-label">

                                City

                            </label>

                            <input
                                    type="text"
                                    class="form-control"
                                    th:field="*{city}"
                                    placeholder="Enter City"
                                    required>

                        </div>

                        

                        <div class="col-md-4 mb-3">

                            <label class="form-label">

                                State

                            </label>

                            <input
                                    type="text"
                                    class="form-control"
                                    th:field="*{state}"
                                    placeholder="Enter State"
                                    required>

                        </div>

                        

                        <div class="col-md-4 mb-3">

                            <label class="form-label">

                                Country

                            </label>

                            <input
                                    type="text"
                                    class="form-control"
                                    th:field="*{country}"
                                    placeholder="Enter Country"
                                    required>

                        </div>
                                                

                        <div class="col-md-4 mb-3">

                            <label class="form-label">

                                Temperature (°C)

                            </label>

                            <input
                                    type="number"
                                    step="0.1"
                                    class="form-control"
                                    th:field="*{temperature}"
                                    placeholder="Temperature"
                                    required>

                        </div>

                        

                        <div class="col-md-4 mb-3">

                            <label class="form-label">

                                Feels Like (°C)

                            </label>

                            <input
                                    type="number"
                                    step="0.1"
                                    class="form-control"
                                    th:field="*{feelsLike}"
                                    placeholder="Feels Like"
                                    required>

                        </div>

                       

                        <div class="col-md-4 mb-3">

                            <label class="form-label">

                                Humidity (%)

                            </label>

                            <input
                                    type="number"
                                    class="form-control"
                                    th:field="*{humidity}"
                                    placeholder="Humidity"
                                    min="0"
                                    max="100"
                                    required>

                        </div>

                       

                        <div class="col-md-4 mb-3">

                            <label class="form-label">

                                Wind Speed (km/h)

                            </label>

                            <input
                                    type="number"
                                    step="0.1"
                                    class="form-control"
                                    th:field="*{windSpeed}"
                                    placeholder="Wind Speed"
                                    required>

                        </div>

                        

                        <div class="col-md-4 mb-3">

                            <label class="form-label">

                                Visibility (km)

                            </label>

                            <input
                                    type="number"
                                    step="0.1"
                                    class="form-control"
                                    th:field="*{visibility}"
                                    placeholder="Visibility"
                                    required>

                        </div>

                        

                        <div class="col-md-4 mb-3">

                            <label class="form-label">

                                Weather Condition

                            </label>

                            <select
                                    class="form-select"
                                    th:field="*{weatherCondition}"
                                    required>

                                <option value="">
                                    Select Condition
                                </option>

                                <option value="Clear">
                                    ☀ Clear
                                </option>

                                <option value="Cloudy">
                                    ☁ Cloudy
                                </option>

                                <option value="Rain">
                                    🌧 Rain
                                </option>

                                <option value="Thunderstorm">
                                    ⛈ Thunderstorm
                                </option>

                                <option value="Snow">
                                    ❄ Snow
                                </option>

                                <option value="Fog">
                                    🌫 Fog
                                </option>

                            </select>

                        </div>

                       

                        <div class="col-md-6 mb-3">

                            <label class="form-label">

                                Weather Icon

                            </label>

                            <input
                                    type="text"
                                    class="form-control"
                                    th:field="*{weatherIcon}"
                                    placeholder="Example : 10d">

                        </div>
                                                

                        <div class="col-md-4 mb-3">

                            <label class="form-label">

                                Risk Level

                            </label>

                            <select
                                    class="form-select"
                                    th:field="*{riskLevel}">

                                <option value="LOW">
                                    LOW
                                </option>

                                <option value="MEDIUM">
                                    MEDIUM
                                </option>

                                <option value="HIGH">
                                    HIGH
                                </option>

                            </select>

                        </div>

                        

                        <div class="col-md-4 mb-3">

                            <label class="form-label">

                                Route Status

                            </label>

                            <select
                                    class="form-select"
                                    th:field="*{routeStatus}">

                                <option value="SAFE">
                                    SAFE
                                </option>

                                <option value="CAUTION">
                                    CAUTION
                                </option>

                                <option value="BLOCKED">
                                    BLOCKED
                                </option>

                            </select>

                        </div>

                        

                        <div class="col-md-12 mb-4">

                            <label class="form-label">

                                AI Suggestion

                            </label>

                            <textarea
                                    class="form-control"
                                    rows="4"
                                    th:field="*{aiSuggestion}"
                                    placeholder="AI suggestion will appear here...">
                            </textarea>

                        </div>

                    </div>

                    

                    <div class="d-flex gap-2">

                        <button
                                type="submit"
                                class="btn btn-primary">

                            <i class="bi bi-check-circle-fill"></i>

                            Save Weather

                        </button>

                        <button
                                type="reset"
                                class="btn btn-secondary">

                            <i class="bi bi-arrow-clockwise"></i>

                            Reset

                        </button>

                        <a
                                th:href="@{/weather}"
                                class="btn btn-danger">

                            <i class="bi bi-arrow-left-circle-fill"></i>

                            Back

                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>



<script th:src="@{/js/weather.js}"></script>

</body>

</html>
