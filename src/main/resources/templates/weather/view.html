<!doctype html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Weather Details | LogiSphere</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"></head><body class="bg-light"><main class="container py-4"><div class="d-flex justify-content-between mb-4"><h1 class="h3">Weather Details</h1><div><a class="btn btn-outline-secondary" th:href="@{/weather}">Back</a> <a class="btn btn-primary" th:href="@{/weather/edit/{id}(id=${weather.id})}">Edit</a></div></div><div class="card"><div class="card-body"><dl class="row mb-0"><dt class="col-sm-3">Location</dt><dd class="col-sm-9" th:text="${weather.city + ', ' + weather.state + ', ' + weather.country}"></dd><dt class="col-sm-3">Temperature</dt><dd class="col-sm-9" th:text="${weather.temperature}"></dd><dt class="col-sm-3">Condition</dt><dd class="col-sm-9" th:text="${weather.weatherCondition}"></dd><dt class="col-sm-3">Humidity</dt><dd class="col-sm-9" th:text="${weather.humidity}"></dd><dt class="col-sm-3">Risk / Route</dt><dd class="col-sm-9" th:text="${weather.riskLevel + ' / ' + weather.routeStatus}"></dd></dl></div></div></main></body></html>
