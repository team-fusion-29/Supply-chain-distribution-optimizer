<!doctype html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Warehouse Details | LogiSphere</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"></head><body class="bg-light"><main class="container py-4"><div class="d-flex justify-content-between mb-4"><h1 class="h3">Warehouse Details</h1><div><a class="btn btn-outline-secondary" th:href="@{/warehouses}">Back</a> <a class="btn btn-primary" th:href="@{/warehouses/edit/{id}(id=${warehouse.id})}">Edit</a></div></div><div class="card"><div class="card-body"><dl class="row mb-0"><dt class="col-sm-3">Code</dt><dd class="col-sm-9" th:text="${warehouse.warehouseCode}"></dd><dt class="col-sm-3">Name</dt><dd class="col-sm-9" th:text="${warehouse.warehouseName}"></dd><dt class="col-sm-3">Manager</dt><dd class="col-sm-9" th:text="${warehouse.managerName}"></dd><dt class="col-sm-3">Location</dt><dd class="col-sm-9" th:text="${warehouse.city + ', ' + warehouse.state}"></dd><dt class="col-sm-3">Capacity</dt><dd class="col-sm-9" th:text="${warehouse.availableCapacity + ' / ' + warehouse.totalCapacity}"></dd><dt class="col-sm-3">Status</dt><dd class="col-sm-9" th:text="${warehouse.status}"></dd></dl></div></div></main></body></html>
