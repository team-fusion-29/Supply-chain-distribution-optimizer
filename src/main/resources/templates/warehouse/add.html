<!DOCTYPE html>

<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>

        Add Warehouse | LogiSphere

    </title>

   

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

    

    <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    

    <link
            rel="stylesheet"
            th:href="@{/css/style.css}">

    <link
            rel="stylesheet"
            th:href="@{/css/dashboard.css}">

    <link
            rel="stylesheet"
            th:href="@{/css/warehouse.css}">

</head>

<body>



<div class="sidebar">

    <div class="logo">

        <i class="fa-solid fa-warehouse"></i>

        <span>

            LogiSphere

        </span>

    </div>

    <ul>

        <li>

            <a th:href="@{/dashboard}">

                <i class="fa-solid fa-house"></i>

                Dashboard

            </a>

        </li>

        <li>

            <a th:href="@{/shipments}">

                <i class="fa-solid fa-box"></i>

                Shipments

            </a>

        </li>

        <li>

            <a th:href="@{/vehicles}">

                <i class="fa-solid fa-truck"></i>

                Vehicles

            </a>

        </li>

        <li class="active">

            <a th:href="@{/warehouses}">

                <i class="fa-solid fa-warehouse"></i>

                Warehouses

            </a>

        </li>

        <li>

            <a th:href="@{/logout}">

                <i class="fa-solid fa-right-from-bracket"></i>

                Logout

            </a>

        </li>

    </ul>

</div>



<div class="main-content">

    <a th:href="@{/admin/dashboard}" class="btn btn-outline-primary mb-3">← Back to Dashboard</a>

    <div class="topbar">

        <div>

            <h2>

                Add Warehouse

            </h2>

            <p>

                Register a new warehouse into LogiSphere.

            </p>

        </div>

        <div class="profile">

            <img
                    src="https://i.pravatar.cc/100"
                    alt="Profile">

            <div>

                <h6
                        th:text="${user.firstName}">

                    User

                </h6>

                <span
                        th:text="${user.role}">

                    ADMIN

                </span>

            </div>

        </div>

    </div>

   

    <div class="content-card">

        <div class="d-flex justify-content-between align-items-center mb-4">

            <h3>

                Warehouse Details

            </h3>

            <a
                    th:href="@{/warehouses}"
                    class="btn btn-secondary">

                <i class="fa-solid fa-arrow-left"></i>

                Back

            </a>

        </div>

      

        <div
                th:if="${error}"
                class="alert alert-danger"
                th:text="${error}">

        </div>

      

        <form
                th:action="@{/warehouses/save}"
                th:object="${warehouse}"
                method="post">

            <div class="row">

                

                <div class="col-md-6 mb-3">

                    <label class="form-label">

                        Warehouse Code

                    </label>

                    <input
                            type="text"
                            class="form-control"
                            th:field="*{warehouseCode}"
                            placeholder="WH001"
                            required>

                </div>

               

                <div class="col-md-6 mb-3">

                    <label class="form-label">

                        Warehouse Name

                    </label>

                    <input
                            type="text"
                            class="form-control"
                            th:field="*{warehouseName}"
                            placeholder="Hyderabad Central Warehouse"
                            required>

                </div>
                                

                <div class="col-md-6 mb-3">

                    <label class="form-label">

                        Manager Name

                    </label>

                    <input
                            type="text"
                            class="form-control"
                            th:field="*{managerName}"
                            placeholder="Ramesh Kumar"
                            required>

                </div>

                

                <div class="col-md-6 mb-3">

                    <label class="form-label">

                        Phone Number

                    </label>

                    <input
                            type="tel"
                            class="form-control"
                            th:field="*{phoneNumber}"
                            placeholder="9876543210"
                            required>

                </div>

                

                <div class="col-md-6 mb-3">

                    <label class="form-label">

                        Email

                    </label>

                    <input
                            type="email"
                            class="form-control"
                            th:field="*{email}"
                            placeholder="warehouse@logisphere.com"
                            required>

                </div>

               
                <div class="col-md-6 mb-3">

                    <label class="form-label">

                        Address

                    </label>

                    <input
                            type="text"
                            class="form-control"
                            th:field="*{address}"
                            placeholder="Gachibowli"
                            required>

                </div>

               

                <div class="col-md-6 mb-3">

                    <label class="form-label">

                        City

                    </label>

                    <input
                            type="text"
                            class="form-control"
                            th:field="*{city}"
                            placeholder="Hyderabad"
                            required>

                </div>

                

                <div class="col-md-6 mb-3">

                    <label class="form-label">

                        State

                    </label>

                    <input
                            type="text"
                            class="form-control"
                            th:field="*{state}"
                            placeholder="Telangana"
                            required>

                </div>

                

                <div class="col-md-6 mb-3">

                    <label class="form-label">

                        Total Capacity (Tons)

                    </label>

                    <input
                            type="number"
                            step="0.01"
                            class="form-control"
                            th:field="*{totalCapacity}"
                            placeholder="5000"
                            required>

                </div>

                

                <div class="col-md-6 mb-3">

                    <label class="form-label">

                        Available Capacity (Tons)

                    </label>

                    <input
                            type="number"
                            step="0.01"
                            class="form-control"
                            th:field="*{availableCapacity}"
                            placeholder="3200"
                            required>

                </div>
                                

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Status

                    </label>

                    <select
                            class="form-select"
                            th:field="*{status}">

                        <option value="ACTIVE">

                            ACTIVE

                        </option>

                        <option value="FULL">

                            FULL

                        </option>

                        <option value="MAINTENANCE">

                            MAINTENANCE

                        </option>

                    </select>

                </div>

            </div>

            

            <div class="d-flex justify-content-end gap-2 mt-4">

                <button
                        type="reset"
                        class="btn btn-secondary">

                    <i class="fa-solid fa-rotate-left"></i>

                    Reset

                </button>

                <button
                        type="submit"
                        class="btn btn-primary">

                    <i class="fa-solid fa-floppy-disk"></i>

                    Save Warehouse

                </button>

            </div>

        </form>

    </div>

</div>



<script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>



<script
        th:src="@{/js/warehouse.js}">
</script>

</body>

</html>
